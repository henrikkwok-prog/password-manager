name: password_manager
description: 安全密码管理器

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 数据库
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # 加密
  encrypt: ^5.0.1
  crypto: ^3.0.3
  
  # 生物识别
  local_auth: ^2.1.8
  
  # 状态管理
  flutter_riverpod: ^2.4.5
  
  # 本地存储（配置）
  shared_preferences: ^2.2.2
  
  # 文件选择
  file_picker: ^6.1.1
  
  # 权限管理
  permission_handler: ^11.0.1
  
  # JSON 处理
  json_annotation: ^4.8.1
  
  # 路径处理
  path: ^1.8.3
  
  # 国际化
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  
  # UI 组件
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  
  # 分享
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.otf
        - asset: assets/fonts/NotoSansSC-Bold.otf
          weight: 700
  
  assets:
    - assets/images/